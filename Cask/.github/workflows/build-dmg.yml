name: Build Docky App and Create DMG

# on:
#   push:
#     branches: [ "main" ]
#   workflow_dispatch: # Allows you to run this manually from the GitHub website

on:
  push:
    tags:
      - 'v*' # Triggers on v1.0.0, v2.1.3, etc.
  workflow_dispatch: # 👈 ADD THIS LINE TO ENABLE THE GITHUB UI BUTTON
    inputs:
      version_tag:
        description: 'Version Tag to create (e.g., v1.2.0)'
        required: true
        default: 'v1.0.0'

env:
  APP_NAME: "Docky"
  SCHEME_NAME: "Docky"
  FORMULA_PATH: "Cask/docky.rb"

jobs:
  build:
    # Uses GitHub's hosted Apple Silicon/Mac cloud runners for free
    runs-on: macos-latest

    steps:
    # Step 1: Clone your GitHub repository onto the runner
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 2: Ensure the correct version of Xcode is selected
    - name: Set up Xcode
      run: sudo xcode-select -s /Applications/Xcode.app

    # Step 3: Build and Archive the app without code signing (keeps it free)
    - name: Build App
      run: |
        xcodebuild archive \
          -project "${{ env.APP_NAME }}.xcodeproj" \
          -scheme "${{ env.SCHEME_NAME }}" \
          -archivePath "./build/${{ env.APP_NAME }}.xcarchive" \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY=""

    # Step 4: Export the compiled .app file out of the archive bundle
    - name: Export App Binary
      run: |
        mkdir -p ./exported-app
        cp -R ./build/${{ env.APP_NAME }}.xcarchive/Products/Applications/*.app ./exported-app/

    # Step 5: Convert the folder into a compressed .dmg file using macOS native tooling
    - name: Generate DMG Package
      run: |
        hdiutil create \
          -volname "${{ env.APP_NAME }} Installer" \
          -srcfolder ./exported-app \
          -ov -format UDZO \
          "${{ env.APP_NAME }}.dmg"

    # Clean up
    - name: Post-Build Workspace Clean
      run: rm -rf ./build ./exported-app


    # Step 6: Upload the final DMG file so you can download it from your browser
    - name: Upload DMG Artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-dmg-package
        path: ${{ env.APP_NAME }}.dmg
  release:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.HOMEBREW_PAT }} # Uses your token to push back to the repo

    - name: Clean Previous Builds
      run: rm -rf ./build ./exported-app *.tar.gz

    - name: Set up Xcode
      run: sudo xcode-select -s /Applications/Xcode.app

    # Step 1: Extract version directly from the pushed Git Tag
    - name: Parse Version Number
      id: get_version
      run: |
        # Strip the 'v' from the tag (e.g., 'v1.2.0' becomes '1.2.0')
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    # Step 2: Build the command line binary or app
    - name: Build App Binary
      run: |
        xcodebuild archive \
          -project "${{ env.APP_NAME }}.xcodeproj" \
          -scheme "${{ env.SCHEME_NAME }}" \
          -archivePath "./build/${{ env.APP_NAME }}.xcarchive" \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY=""

    # Step 3: Export binary and compress into a .tar.gz (Homebrew standard distribution format)
    - name: Package for Homebrew
      id: package
      run: |
        mkdir -p ./exported-app
        # Copy compiled binary out of the archive
        cp -R "./build/${{ env.APP_NAME }}.xcarchive/Products/Applications/"* ./exported-app/
        
        # Compress into a tarball
        TARBALL_NAME="${{ env.APP_NAME }}-${{ env.VERSION }}.tar.gz"
        tar -czf "$TARBALL_NAME" -C ./exported-app .
        
        # Calculate SHA256 checksum required by Homebrew formula
        SHA256_HASH=$(shasum -a 256 "$TARBALL_NAME" | awk '{print $1}')
        
        # Expose properties to downstream steps
        echo "tarball_name=$TARBALL_NAME" >> $GITHUB_ENV
        echo "sha256=$SHA256_HASH" >> $GITHUB_ENV

    # Step 4: Create a GitHub Release and upload the tarball asset
    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ env.tarball_name }}
        tag_name: ${{ github.ref_name }}
        name: Release v${{ env.VERSION }}
        draft: false
        prerelease: false
 # Step 5: Update the version, download URL, and SHA256 fields inside the Ruby file
    - name: Update Homebrew Formula
      run: |
        DOWNLOAD_URL="https://github.com{{ github.repository }}/releases/download/${{ github.ref_name }}/${{ env.tarball_name }}"
        sed -i '' "s|url \".*\"|url \"$DOWNLOAD_URL\"|g" ${{ env.FORMULA_PATH }}
        sed -i '' "s|sha256 \".*\"|sha256 \"${{ env.sha256 }}\"|g" ${{ env.FORMULA_PATH }}
        sed -i '' "s|version \".*\"|version \"${{ env.VERSION }}\"|g" ${{ env.FORMULA_PATH }}

    # NEW STEP 6: Validate the newly modified formula before finalizing the release
    - name: Audit and Test Homebrew Formula
      run: |
        # 1. Audit checks the Ruby code against strict Homebrew style guides
        # --new-formula enforces rules required for community acceptance
        brew audit --new-formula ./${{ env.FORMULA_PATH }}
        
        # 2. Test installation using the local workspace formula file
        brew install --build-from-source ./${{ env.FORMULA_PATH }}
        
        # 3. Trigger the internal 'test do' block inside your formula to ensure binary executes
        brew test ./${{ env.FORMULA_PATH }}

    # Step 7: Commit and push the updated formula back to your repository
    - name: Push Formula Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        git add ${{ env.FORMULA_PATH }}
        git commit -m "brew: update formula to v${{ env.VERSION }}"
        git push origin main